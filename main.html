<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Rock Paper Scissors game</title>
    </head>
    <body>
        <div class="container">
            <div class="result_field">
                <!-- Choice's image -->
                <div class="result_images">
                    <span class="user_result">
                        <img src="images/rock.png" alt="user's choice">
                    </span>
                    <span class="cpu_result">
                        <img src="images/rock.png" alt="cpu's choice">
                    </span>
                </div>

                <!-- Status game text -->
                <div class="result">
                    Let's play !
                </div>
            </div>
            
            <!-- User's options -->
            <div class="option_images">
                <span class="option_image">
                    <img src="images/rock.png" alt="user's option : rock">
                    <p>Rock</p>
                </span>
                <span class="option_image">
                    <img src="images/paper.png" alt="user's option : paper">
                    <p>Paper</p>
                </span>
                <span class="option_image">
                    <img src="images/scissors.png" alt="user's option : scissors">
                    <p>Scissors</p>
                </span>
            </div>
        </div>
        <!-- Scripts -->
        <script src="index.js" defer></script>
    </body>
</html>
